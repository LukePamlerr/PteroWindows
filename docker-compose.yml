services:
  database:
    image: mariadb:10.11
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "./data/database:/var/lib/mysql"
    environment:
      MYSQL_DATABASE: "panel"
      MYSQL_USER: "pterodactyl"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    networks:
      - ptero_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    restart: always
    networks:
      - ptero_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - "./data/panel/var/:/app/var/"
      - "./data/panel/logs/:/app/storage/logs"
      - "./data/panel/nginx/:/etc/nginx/http.d/"
      - "./data/panel/certs/:/etc/letsencrypt/"
    environment:
      APP_URL: "${APP_URL}"
      APP_TIMEZONE: "${APP_TIMEZONE:-UTC}"
      APP_SERVICE_AUTHOR: "${APP_SERVICE_AUTHOR}"
      APP_ENV: "${APP_ENV:-production}"
      APP_ENVIRONMENT_ONLY: "${APP_ENVIRONMENT_ONLY:-false}"
      CACHE_DRIVER: "redis"
      SESSION_DRIVER: "redis"
      QUEUE_DRIVER: "redis"
      REDIS_HOST: "cache"
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "panel"
      DB_USERNAME: "pterodactyl"
      DB_PASSWORD: "${DB_PASSWORD}"
      LE_EMAIL: "${LE_EMAIL}"
      MAIL_DRIVER: "${MAIL_DRIVER:-smtp}"
      MAIL_HOST: "${MAIL_HOST:-mail}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-true}"
      MAIL_FROM: "${MAIL_FROM:-noreply@example.com}"
    networks:
      - ptero_net

networks:
  ptero_net:
    driver: bridge
