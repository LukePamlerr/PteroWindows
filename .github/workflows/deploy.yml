name: Deploy PteroWindows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Scripts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate batch scripts syntax
        shell: cmd
        run: |
          for %%f in (install-panel.bat install-wings.bat update-all.bat scripts\import-eggs.bat) do (
            echo Validating %%f...
            REM Check for basic syntax issues - missing @echo off, unbalanced parentheses etc.
            findstr /b "goto" %%f >nul 2>&1 && echo   OK
          )

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config

      - name: Validate .env.example keys
        run: |
          grep -oP '^[A-Z_]+(?==)' .env.example | sort > /tmp/env_keys
          echo "Environment keys:"
          cat /tmp/env_keys

  release:
    name: Create Release
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          mkdir -p release
          cp -r install-panel.bat install-wings.bat update-all.bat docker-compose.yml .env.example scripts eggs release/
          cd release
          7z a -tzip "../PteroWindows-${{ github.ref_name }}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: PteroWindows-*.zip
          generate_release_notes: true
