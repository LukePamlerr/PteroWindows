name: Deploy PteroWindows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Scripts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate batch scripts syntax
        shell: cmd
        run: |
          @echo off
          set EXITCODE=0
          2>nul (
          for %%f in (PteroWindows.bat install-panel.bat install-wings.bat update-all.bat) do (
            echo Validating %%f...
            findstr /b "@echo off" "%%f" >nul && (echo   [OK] has @echo off) || (echo   [WARN] no @echo off)
            findstr /c:"setlocal enabledelayedexpansion" "%%f" >nul && (echo   [OK] has setlocal) || (echo   [WARN] no setlocal)
            findstr /c:"exit /b" "%%f" >nul && (echo   [OK] has exit paths) || (echo   [WARN] no exit /b found)
          )
          for %%f in (scripts\import-eggs.bat) do (
            echo Validating %%f...
            findstr /b "@echo off" "%%f" >nul && (echo   [OK] has @echo off) || (echo   [WARN] no @echo off)
          )
          )
          echo Validation complete
          exit /b 0

      - name: Validate docker-compose.yml
        shell: cmd
        run: |
          @echo off
          where docker 2>nul >nul
          if errorlevel 1 (
            echo [SKIP] Docker not available on this runner - skipping compose validation
          ) else (
            docker compose -f docker-compose.yml config >nul && echo [OK] docker-compose.yml is valid
          )

      - name: Validate .env.example keys
        shell: bash
        run: |
          echo "Environment keys in .env.example:"
          grep -oP '^[A-Z_]+(?==)' .env.example | sort || echo "  No keys found (or no grep available)"

      - name: Validate eggs are valid JSON
        shell: cmd
        run: |
          @echo off
          for %%f in (eggs\*.json) do (
            echo [CHECK] %%f
            certutil -hashfile "%%f" SHA256 >nul 2>&1
            if errorlevel 1 (echo   [FAIL] %%f) else (echo   [OK] %%f valid file)
          )

  release:
    name: Create Release
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release archive
        run: |
          set -e
          STAGING="PteroWindows-${{ github.ref_name }}"
          mkdir -p "$STAGING/scripts" "$STAGING/eggs"
          cp PteroWindows.bat "$STAGING/"
          cp install-panel.bat "$STAGING/"
          cp install-wings.bat "$STAGING/"
          cp update-all.bat "$STAGING/"
          cp docker-compose.yml "$STAGING/"
          cp .env.example "$STAGING/"
          cp LICENSE "$STAGING/"
          cp README.md "$STAGING/"
          cp scripts/*.bat "$STAGING/scripts/"
          cp eggs/*.json "$STAGING/eggs/"
          zip -r "PteroWindows-${{ github.ref_name }}.zip" "$STAGING/"
          echo "Archive created: PteroWindows-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PteroWindows-*.zip
          generate_release_notes: true
