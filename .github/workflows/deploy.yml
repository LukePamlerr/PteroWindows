name: Deploy PteroWindows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate batch scripts syntax
        shell: cmd
        run: |
          @echo off
          set EXITCODE=0
          2>nul (
          for %%f in (PteroWindows.bat install-panel.bat install-wings.bat update-all.bat) do (
            echo Validating %%f...
            findstr /b "@echo off" "%%f" >nul && (echo   [OK] has @echo off) || (echo   [WARN] no @echo off)
            findstr /c:"setlocal enabledelayedexpansion" "%%f" >nul && (echo   [OK] has setlocal) || (echo   [WARN] no setlocal)
            findstr /c:"exit /b" "%%f" >nul && (echo   [OK] has exit paths) || (echo   [WARN] no exit /b found)
          )
          for %%f in (scripts\import-eggs.bat) do (
            echo Validating %%f...
            findstr /b "@echo off" "%%f" >nul && (echo   [OK] has @echo off) || (echo   [WARN] no @echo off)
          )
          )
          echo Validation complete

      - name: Validate docker-compose.yml
        shell: cmd
        run: |
          @echo off
          where docker 2>nul >nul
          if errorlevel 1 (
            echo [SKIP] Docker not available on this runner
          ) else (
            docker compose -f docker-compose.yml config >nul && echo [OK] docker-compose.yml is valid
          )

      - name: Validate Electron app files exist
        shell: cmd
        run: |
          @echo off
          if exist main.js (echo [OK] main.js) else (echo [FAIL] main.js missing)
          if exist preload.js (echo [OK] preload.js) else (echo [FAIL] preload.js missing)
          if exist renderer\index.html (echo [OK] renderer/index.html) else (echo [FAIL] renderer/index.html missing)
          if exist renderer\styles.css (echo [OK] renderer/styles.css) else (echo [FAIL] renderer/styles.css missing)
          if exist renderer\app.js (echo [OK] renderer/app.js) else (echo [FAIL] renderer/app.js missing)

  build:
    name: Build Electron App
    needs: validate
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npx @electron/packager . PteroWindows --platform=win32 --arch=x64 --out=dist --overwrite --ignore='node_modules|dist|.git|.github' --executable-name='PteroWindows' --app-version=${{ github.ref_name }}

      - name: Create portable zip
        run: Compress-Archive -Path dist/PteroWindows-win32-x64/* -DestinationPath dist/PteroWindows-${{ github.ref_name }}-portable.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PteroWindows-${{ github.ref_name }}
          path: dist/

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: PteroWindows-${{ github.ref_name }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PteroWindows-*.zip
          generate_release_notes: true
